name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # for creating GitHub releases
  packages: write   # for pushing to ghcr.io

jobs:
  build-binary:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          version="${GITHUB_REF_NAME}"
          out="bscbench-${version}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${out}"
          go build \
            -ldflags="-s -w -X main.Version=${version}" \
            -o "dist/${out}/bscbench" \
            ./cmd/bscbench
          cp README.md LICENSE "dist/${out}/" 2>/dev/null || true
          tar -C dist -czvf "dist/${out}.tar.gz" "${out}"
          ( cd dist && sha256sum "${out}.tar.gz" > "${out}.tar.gz.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: bscbench-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          retention-days: 7

  release:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.tar.gz dist/*.tar.gz.sha256

  container:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=LGPL-3.0-or-later
